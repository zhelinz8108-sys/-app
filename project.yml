name: HotelFrontDesk
options:
  bundleIdPrefix: com.hotel
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  defaultConfig: Release
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  HotelFrontDesk:
    type: application
    platform: iOS
    sources:
      - HotelFrontDesk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hotel.frontdesk
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "酒店前台"
        INFOPLIST_KEY_NSCameraUsageDescription: "需要使用相机扫描客人身份证，自动录入姓名和证件号"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
    entitlements:
      path: HotelFrontDesk/HotelFrontDesk.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.hotel.frontdesk
        com.apple.developer.icloud-services:
          - CloudKit

  HotelFrontDeskTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HotelFrontDeskTests
    dependencies:
      - target: HotelFrontDesk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hotel.frontdesk.tests
        GENERATE_INFOPLIST_FILE: YES
